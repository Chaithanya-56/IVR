<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRCTC IVR Simulator | Modern Premium</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="main-layout">
        
        <!-- LEFT SIDE: Chat System -->
        <main class="chat-section">
            <header class="chat-header glass-card">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-train-subway"></i>
                    </div>
                    <div class="logo-text">
                        <h1>IRCTC</h1>
                        <span>IVR Simulator</span>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="sound-toggle-btn" class="glass-card icon-btn-small active" title="Enable/Disable Sound">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <div class="mode-toggle glass-card">
                        <button id="chat-mode-btn" class="active">
                            <i class="fas fa-comment-dots"></i>
                            <span>Chat</span>
                        </button>
                        <button id="dtmf-mode-btn">
                            <i class="fas fa-th"></i>
                            <span>Keypad</span>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Scrollable Messages Area -->
            <div id="chat-messages" class="messages">
                <!-- Initial Welcome Message -->
                <div class="message system">
                    <div class="bubble">
                        <div class="bubble-content">
                            Welcome to IRCTC IVR. How can I assist you today?
                            <div class="quick-options-grid">
                                <span>1. Booking</span>
                                <span>2. PNR Status</span>
                                <span>3. Schedule</span>
                                <span>4. Cancellation</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FLOATING Input Area -->
            <footer class="input-area">
                <div id="suggestion-buttons" class="suggestion-buttons"></div>
                
                <div class="input-wrapper glass-card">
                    <!-- Chat Mode Input -->
                    <div id="chat-input-container" class="input-container">
                        <button id="voice-btn" class="icon-btn mic-btn" title="Voice Input">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <input type="text" id="chat-input" placeholder="Ask anything... e.g. 'Book ticket to Mumbai'">
                        <button id="send-btn" class="icon-btn send-btn" title="Send Message">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>

                    <!-- DTMF Mode Input (Hidden by default) -->
                    <div id="dtmf-input-container" class="keypad-container hidden">
                        <div class="dtmf-display glass-card">
                            <input type="text" id="dtmf-input" placeholder="Enter digits..." maxlength="10">
                            <button id="dtmf-submit-btn" class="icon-btn dtmf-submit" title="Submit">
                                <i class="fas fa-check"></i>
                            </button>
                            <button id="dtmf-clear-btn" class="icon-btn dtmf-clear" title="Clear">
                                <i class="fas fa-backspace"></i>
                            </button>
                        </div>
                        <div class="dtmf-grid">
                            <button class="dtmf-btn" data-digit="1">1</button>
                            <button class="dtmf-btn" data-digit="2">2</button>
                            <button class="dtmf-btn" data-digit="3">3</button>
                            <button class="dtmf-btn" data-digit="4">4</button>
                            <button class="dtmf-btn" data-digit="5">5</button>
                            <button class="dtmf-btn" data-digit="6">6</button>
                            <button class="dtmf-btn" data-digit="7">7</button>
                            <button class="dtmf-btn" data-digit="8">8</button>
                            <button class="dtmf-btn" data-digit="9">9</button>
                            <button class="dtmf-btn" data-digit="*">*</button>
                            <button class="dtmf-btn" data-digit="0">0</button>
                            <button class="dtmf-btn" data-digit="#">#</button>
                        </div>
                    </div>
                </div>

                <div class="quick-actions">
                    <button class="action-btn btn-booking" data-text="Book Ticket">
                        <i class="fas fa-ticket"></i> Book Ticket
                    </button>
                    <button class="action-btn btn-pnr" data-text="PNR Status">
                        <i class="fas fa-search"></i> PNR Status
                    </button>
                    <button class="action-btn btn-schedule" data-text="Train Schedule">
                        <i class="fas fa-calendar-alt"></i> Train Schedule
                    </button>
                    <button class="action-btn btn-cancel" data-text="Cancel Ticket">
                        <i class="fas fa-times-circle"></i> Cancel Ticket
                    </button>
                </div>
            </footer>
        </main>

        <!-- RIGHT SIDE: Debug Panel -->
        <aside class="debug-panel glass-card">
            <div class="debug-header">
                <i class="fas fa-microchip"></i>
                <h2>Engine Debug</h2>
            </div>
            
            <div class="debug-scroll-area">
                <div class="debug-group">
                    <div class="debug-item glass-card">
                        <label>Current State</label>
                        <span id="debug-state" class="debug-val">MAIN_MENU</span>
                    </div>
                    
                    <div class="debug-item glass-card">
                        <label>Detected Intent</label>
                        <span id="debug-intent" class="debug-val">none</span>
                    </div>

                    <div class="debug-item glass-card">
                        <label>Confidence</label>
                        <div class="confidence-wrapper">
                            <div class="progress-bar">
                                <div id="debug-confidence-bar" class="progress-fill" style="width: 0%"></div>
                            </div>
                            <span id="debug-confidence" class="debug-val">0%</span>
                        </div>
                    </div>

                    <div class="debug-item glass-card">
                        <label>DTMF Buffer</label>
                        <span id="debug-buffer" class="debug-val">Empty</span>
                    </div>
                </div>

                <div class="debug-section glass-card">
                    <h3><i class="fas fa-database"></i> Entities</h3>
                    <div class="entity-grid">
                        <div class="entity-item">
                            <label>Source</label>
                            <span id="entity-source" class="entity-val empty">None</span>
                        </div>
                        <div class="entity-item">
                            <label>Destination</label>
                            <span id="entity-destination" class="entity-val empty">None</span>
                        </div>
                        <div class="entity-item">
                            <label>Date</label>
                            <span id="entity-date" class="entity-val empty">None</span>
                        </div>
                        <div class="entity-item">
                            <label>Selected Train</label>
                            <span id="entity-train" class="entity-val empty">None</span>
                        </div>
                        <div class="entity-item">
                            <label>Class</label>
                            <span id="entity-class" class="entity-val empty">None</span>
                        </div>
                    </div>
                </div>

                <div class="debug-section glass-card history">
                    <h3><i class="fas fa-history"></i> Session Log</h3>
                    <div id="debug-history" class="history-list">
                        <!-- History logs here -->
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <!-- Inject session_id from backend -->
    <script>
        const SESSION_ID = "{{ session_id }}";
    </script>
    <script src="/static/script.js"></script>
    <!-- Audio element for backend TTS fallback -->
    <audio id="tts-audio" style="display: none;"></audio>
</body>
</html>
